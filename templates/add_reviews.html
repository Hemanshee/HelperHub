{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">
    <div class="card p-4 shadow">

        <h3>Review {{ helper.name }}</h3>

        <form method="POST">
            {% csrf_token %}

            <label>Rating (1-5)</label>
            <input type="number" name="rating" min="1" max="5" class="form-control mb-3">

            <textarea name="comment" class="form-control mb-3" placeholder="Write review"></textarea>

            <button class="btn btn-warning w-100">Submit</button>
        </form>

    </div>
</div>

{% endblock %}
